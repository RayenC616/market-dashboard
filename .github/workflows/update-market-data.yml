name: Update Market Data

on:
  schedule:
    # 22:00 UTC = 07:00 KST the next day
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests openpyxl

      - run: python scripts/update_market_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "market-data-bot"
          git config user.email "actions@github.com"
          git add data/market_history.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily market data update: $(date -u +%Y-%m-%d)"
            git push
          fi
