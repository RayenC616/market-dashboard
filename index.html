<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 마켓 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#0b1f3a; --navy2:#13294b; --gold:#b08d57; --pos:#0a7d3c; --neg:#b3261e;
    --bg:#f4f5f7; --card:#ffffff; --border:#dfe3e8; --muted:#5b6470;
  }
  *{box-sizing:border-box;}
  body{font-family:'Malgun Gothic','Apple SD Gothic Neo',Arial,Helvetica,sans-serif;background:var(--bg);color:#1b1f24;margin:0;}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:28px 40px;}
  header h1{margin:0 0 4px;font-size:26px;letter-spacing:.3px;font-family:Georgia,'Times New Roman',serif;}
  header .sub{font-size:13px;color:#cfd8e6;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .btn{font-family:inherit;border:none;padding:10px 18px;border-radius:4px;
    font-size:13px;font-weight:bold;cursor:pointer;}
  .btn-gold{background:var(--gold);color:#1b1f24;}
  .btn-gold:hover{background:#c39c63;}
  .btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);}
  .btn-outline:hover{background:rgba(255,255,255,.12);}
  main{max-width:1180px;margin:0 auto;padding:28px 24px 60px;}
  section{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:22px 26px;margin-bottom:22px;}
  h2{font-size:18px;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:8px;margin-top:0;
     display:flex;justify-content:space-between;align-items:center;}
  .toggle{display:inline-flex;border:1px solid var(--border);border-radius:20px;overflow:hidden;font-size:12px;}
  .toggle button{font-family:inherit;border:none;background:#eef1f5;color:var(--muted);padding:6px 16px;cursor:pointer;font-weight:bold;}
  .toggle button.active{background:var(--navy);color:#fff;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:16px;}
  .tile{border-radius:6px;padding:12px 14px;cursor:pointer;color:#fff;transition:transform .1s;border:1px solid rgba(0,0,0,.06);}
  .tile:hover{transform:translateY(-2px);}
  .tile.selected{outline:3px solid var(--gold);outline-offset:1px;}
  .tile .t-name{font-size:12.5px;font-weight:bold;opacity:.95;}
  .tile .t-price{font-size:16px;font-weight:bold;margin:6px 0 2px;}
  .tile .t-pct{font-size:13.5px;font-weight:bold;}
  .tile.editable{cursor:grab;}
  .tile.editable .t-name::before{content:"⠿ ";opacity:.8;}
  .tile.dragging{opacity:.4;}
  .tile.drag-over{outline:2px dashed #fff;outline-offset:2px;}
  .order-bar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding:14px 16px;
    background:var(--card);border:1px solid var(--border);border-radius:6px;}
  .order-bar .label{font-size:12.5px;color:var(--muted);font-weight:bold;}
  .slot-picker{display:inline-flex;gap:4px;flex-wrap:wrap;}
  .slot-btn{font-family:inherit;width:26px;height:26px;border-radius:5px;border:1px solid var(--border);
    background:#eef1f5;color:var(--muted);font-size:11.5px;font-weight:bold;cursor:pointer;position:relative;}
  .slot-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .slot-btn.customized::after{content:"";position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:var(--gold);}
  .edit-toggle-btn{font-family:inherit;border:1px solid var(--border);background:#eef1f5;color:var(--navy2);
    padding:6px 14px;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer;}
  .edit-toggle-btn.active{background:var(--gold);color:#1b1f24;border-color:var(--gold);}
  .reset-slot-btn{font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--neg);
    padding:6px 14px;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer;}
  .manage-btn{font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--navy2);
    padding:6px 14px;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer;}
  .manage-panel{display:none;margin-bottom:16px;padding:16px 18px;background:var(--card);border:1px solid var(--border);border-radius:6px;}
  .manage-panel.open{display:block;}
  .manage-panel h4{margin:0 0 8px;font-size:13px;color:var(--navy2);}
  .manage-cols{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .manage-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;}
  .auth-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .auth-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:36px 32px;width:320px;box-shadow:0 8px 30px rgba(0,0,0,.12);}
  .auth-box h2{margin:0 0 6px;color:var(--navy);font-size:20px;}
  .auth-note{font-size:12.5px;color:var(--muted);margin:0 0 18px;}
  .auth-box input{width:100%;padding:10px 12px;margin-bottom:10px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;box-sizing:border-box;}
  .auth-box button{width:100%;padding:11px;border:none;border-radius:5px;background:var(--navy);color:#fff;font-weight:bold;font-size:13.5px;cursor:pointer;font-family:inherit;}
  .auth-box button:hover{background:var(--navy2);}
  .auth-error{color:var(--neg);font-size:12px;margin-top:10px;}
  .user-badge{display:flex;align-items:center;gap:10px;color:#fff;font-size:12.5px;}
  .user-badge .name{font-weight:bold;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;}
  .user-badge .logout-link{color:#cfd8e6;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit;font-size:12.5px;padding:0;}
  .chart-panel{margin-top:18px;border:1px solid var(--border);border-radius:6px;padding:16px;background:#fafbfc;display:none;}
  .chart-panel.open{display:block;}
  .chart-panel-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:4px;}
  .chart-panel h3{margin:0;font-size:15px;color:var(--navy2);}
  .chart-panel .meta-line{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .note{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5;}
  .status-bar{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .status-bar .warn{color:var(--neg);font-weight:bold;}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--navy);
    border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:20px;}
</style>
</head>
<body>

<div id="authGateContainer"></div>

<div id="appRoot" style="display:none;">
<header>
  <div class="toolbar">
    <div>
      <h1>글로벌 마켓 대시보드</h1>
      <div class="sub" id="lastUpdatedLine">데이터 불러오는 중…</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="user-badge" id="userBadge"></div>
      <button class="btn btn-outline" id="refreshBtn" onclick="handleRefresh()">⟳ 데이터 새로고침</button>
      <button class="btn btn-gold" onclick="location.href='brief.html'">마켓 브리프 →</button>
    </div>
  </div>
</header>

<main>

<div class="status-bar" id="statusBar" style="margin-bottom:16px;"></div>

<div class="order-bar">
  <span class="label">정렬 슬롯</span>
  <span class="slot-picker" id="slotPicker"></span>
  <button class="edit-toggle-btn" id="editToggleBtn">✎ 순서 편집</button>
  <button class="reset-slot-btn" id="resetSlotBtn">이 슬롯 초기화</button>
  <button class="manage-btn" id="manageToggleBtn">＋／－ 자산 추가·삭제</button>
  <span class="label" id="editHint" style="display:none;">편집 모드: 타일을 드래그해 순서를 바꾸세요 (같은 구역 내에서만)</span>
</div>

<div class="manage-panel" id="managePanel">
  <h4>표시할 자산 선택 (선택 해제 시 대시보드와 브리프에서 숨겨집니다)</h4>
  <div class="manage-cols">
    <div>
      <div class="label" style="margin-bottom:6px;">주요 지수</div>
      <div id="manageEquityList"></div>
    </div>
    <div>
      <div class="label" style="margin-bottom:6px;">원자재</div>
      <div id="manageCommodityList"></div>
    </div>
  </div>
</div>

<section>
  <h2>
    주요 지수
    <span class="toggle" id="toggleEquity">
      <button data-mode="1D" class="active">일간</button>
      <button data-mode="1W">주간</button>
    </span>
  </h2>
  <div class="grid" id="equityGrid"></div>
  <div class="chart-panel" id="equityChartPanel">
    <div class="chart-panel-head">
      <div>
        <h3 id="equityChartTitle"></h3>
        <div class="meta-line" id="equityChartMeta"></div>
      </div>
      <span class="toggle" id="equityRangeToggle">
        <button data-range="1W">1주</button>
        <button data-range="1M">1개월</button>
        <button data-range="3M">3개월</button>
        <button data-range="1Y" class="active">1년</button>
        <button data-range="3Y">3년</button>
      </span>
    </div>
    <canvas id="equityChartCanvas" height="90"></canvas>
  </div>
</section>

<section>
  <h2>
    원자재
    <span class="toggle" id="toggleCommodity">
      <button data-mode="1D" class="active">일간</button>
      <button data-mode="1W">주간</button>
    </span>
  </h2>
  <div class="grid" id="commodityGrid"></div>
  <div class="chart-panel" id="commodityChartPanel">
    <div class="chart-panel-head">
      <div>
        <h3 id="commodityChartTitle"></h3>
        <div class="meta-line" id="commodityChartMeta"></div>
      </div>
      <span class="toggle" id="commodityRangeToggle">
        <button data-range="1W">1주</button>
        <button data-range="1M">1개월</button>
        <button data-range="3M">3개월</button>
        <button data-range="1Y" class="active">1년</button>
        <button data-range="3Y">3년</button>
      </span>
    </div>
    <canvas id="commodityChartCanvas" height="90"></canvas>
  </div>
</section>

</main>

<footer>데이터 출처: 주요 지수는 Yahoo Finance, 원자재(WTI·금·은·구리·니켈·옥수수·밀·대두)는 investing.com 기준입니다. 투자 참고용이며 투자 권유가 아닙니다.</footer>
</div>

<script src="js/auth.js"></script>
<script src="js/market.js"></script>
<script src="js/asset-order.js"></script>
<script>
let mode = { equity: "1D", commodity: "1D" };
let chartRange = { equity: "1Y", commodity: "1Y" };
let selectedTile = { equity: null, commodity: null };
let chartInstances = { equity: null, commodity: null };
let editMode = false;
let dragKey = null;

function fmtPrice(stats, key) {
  const a = ASSETS[key];
  const val = stats.last.toLocaleString(undefined, { minimumFractionDigits: a.decimals, maximumFractionDigits: a.decimals });
  return a.unit ? `${val} ${a.unit}` : val;
}

function pctColor(pct) {
  if (pct === null || pct === undefined) return "#8a8f98";
  const clamped = Math.max(-5, Math.min(5, pct));
  const t = Math.abs(clamped) / 5;
  const lightness = 46 - t * 16;
  return pct >= 0 ? `hsl(146, 55%, ${lightness}%)` : `hsl(3, 62%, ${lightness}%)`;
}

function renderGrid(group, gridId) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = "";
  getOrder(group).forEach(key => {
    if (!ASSETS[key] || ASSETS[key].group !== group) return;
    const stats = getStats(key);
    if (!stats) return;
    const pct = mode[group] === "1D" ? stats.pct1D : stats.pct1W;
    const tile = document.createElement("div");
    tile.className = "tile" + (selectedTile[group] === key ? " selected" : "") + (editMode ? " editable" : "");
    tile.dataset.key = key;
    tile.dataset.group = group;
    tile.draggable = editMode;
    tile.style.background = pctColor(pct);
    tile.innerHTML = `
      <div class="t-name">${stats.name}</div>
      <div class="t-price">${fmtPrice(stats, key)}</div>
      <div class="t-pct">${pct === null ? "N/A" : (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%"}</div>
    `;
    tile.onclick = () => {
      if (editMode) return;
      selectedTile[group] = (selectedTile[group] === key) ? null : key;
      renderGrid(group, gridId);
      renderChart(group, key === selectedTile[group] ? key : null);
    };
    tile.addEventListener("dragstart", () => {
      dragKey = key;
      tile.classList.add("dragging");
    });
    tile.addEventListener("dragend", () => {
      tile.classList.remove("dragging");
    });
    tile.addEventListener("dragover", (e) => {
      if (dragKey === null || dragKey === key) return;
      e.preventDefault();
      tile.classList.add("drag-over");
    });
    tile.addEventListener("dragleave", () => {
      tile.classList.remove("drag-over");
    });
    tile.addEventListener("drop", (e) => {
      e.preventDefault();
      tile.classList.remove("drag-over");
      if (dragKey === null || dragKey === key) return;
      reorderGroup(group, dragKey, key);
      dragKey = null;
      renderGrid(group, gridId);
    });
    grid.appendChild(tile);
  });
}

function reorderGroup(group, movedKey, targetKey) {
  const newOrder = getOrder(group).filter(k => k !== movedKey);
  const insertAt = newOrder.indexOf(targetKey);
  if (insertAt < 0) return;
  newOrder.splice(insertAt, 0, movedKey);
  setOrder(group, newOrder);
}

function renderChart(group, key) {
  const panel = document.getElementById(group + "ChartPanel");
  if (!key) { panel.classList.remove("open"); return; }
  panel.classList.add("open");
  const stats = getStats(key);
  const series = getChartSeries(key, chartRange[group]);
  document.getElementById(group + "ChartTitle").textContent = `${stats.name} — 가격 추이`;
  document.getElementById(group + "ChartMeta").textContent =
    `최근 종가: ${fmtPrice(stats, key)} (${stats.lastDate.toISOString().slice(0,10)})  •  출처: ${stats.source}`;

  const canvas = document.getElementById(group + "ChartCanvas");
  if (chartInstances[group]) chartInstances[group].destroy();
  chartInstances[group] = new Chart(canvas, {
    type: "line",
    data: {
      labels: series.labels,
      datasets: [{
        data: series.values,
        borderColor: "#13294b",
        backgroundColor: "#13294b",
        borderWidth: 1.5,
        pointRadius: 0,
        spanGaps: true,
        tension: 0.1,
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { maxTicksLimit: 8 } } },
    }
  });
}

function setupToggle(toggleId, group, gridId) {
  const el = document.getElementById(toggleId);
  el.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      mode[group] = btn.dataset.mode;
      el.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderGrid(group, gridId);
    };
  });
}

function setupRangeToggle(toggleId, group) {
  const el = document.getElementById(toggleId);
  el.querySelectorAll("button").forEach(btn => {
    btn.onclick = () => {
      chartRange[group] = btn.dataset.range;
      el.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (selectedTile[group]) renderChart(group, selectedTile[group]);
    };
  });
}

function renderSlotPicker() {
  const el = document.getElementById("slotPicker");
  el.innerHTML = "";
  const active = getActiveSlot();
  for (let n = 1; n <= ASSET_ORDER_SLOT_COUNT; n++) {
    const btn = document.createElement("button");
    btn.className = "slot-btn" + (n === active ? " active" : "") + (isSlotCustomized(n) ? " customized" : "");
    btn.textContent = n;
    btn.title = `슬롯 ${n}` + (isSlotCustomized(n) ? " (커스텀 순서 저장됨)" : " (기본 순서)");
    btn.onclick = () => {
      setActiveSlot(n);
      renderSlotPicker();
      renderGrid("equity", "equityGrid");
      renderGrid("commodity", "commodityGrid");
      if (document.getElementById("managePanel").classList.contains("open")) {
        renderManageList("equity", "manageEquityList");
        renderManageList("commodity", "manageCommodityList");
      }
    };
    el.appendChild(btn);
  }
}

function setupOrderControls() {
  renderSlotPicker();

  const editBtn = document.getElementById("editToggleBtn");
  const editHint = document.getElementById("editHint");
  editBtn.onclick = () => {
    editMode = !editMode;
    editBtn.classList.toggle("active", editMode);
    editHint.style.display = editMode ? "" : "none";
    renderGrid("equity", "equityGrid");
    renderGrid("commodity", "commodityGrid");
  };

  document.getElementById("resetSlotBtn").onclick = () => {
    resetActiveSlot();
    renderSlotPicker();
    renderGrid("equity", "equityGrid");
    renderGrid("commodity", "commodityGrid");
  };
}

function renderManageList(group, listId) {
  const el = document.getElementById(listId);
  el.innerHTML = "";
  getAllOrder(group).forEach(key => {
    if (!ASSETS[key]) return;
    const id = "manage_" + key;
    const row = document.createElement("label");
    row.className = "manage-item";
    row.htmlFor = id;
    row.innerHTML = `<input type="checkbox" id="${id}" ${isHidden(key) ? "" : "checked"}> ${ASSETS[key].name}`;
    row.querySelector("input").onchange = (e) => {
      setHidden(key, !e.target.checked);
      renderGrid("equity", "equityGrid");
      renderGrid("commodity", "commodityGrid");
    };
    el.appendChild(row);
  });
}

function setupManagePanel() {
  const panel = document.getElementById("managePanel");
  document.getElementById("manageToggleBtn").onclick = () => {
    panel.classList.toggle("open");
    if (panel.classList.contains("open")) {
      renderManageList("equity", "manageEquityList");
      renderManageList("commodity", "manageCommodityList");
    }
  };
}

function renderLastUpdated(lastRowDate) {
  const line = document.getElementById("lastUpdatedLine");
  if (lastRowDate) {
    line.textContent = "데이터 기준일: " + lastRowDate.toISOString().slice(0, 10) +
      " (GitHub Actions로 매일 07:00 KST경 자동 갱신)";
  } else {
    line.textContent = "데이터 날짜를 확인할 수 없습니다.";
  }
}

async function handleRefresh() {
  const btn = document.getElementById("refreshBtn");
  const status = document.getElementById("statusBar");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 새로고침 중…';
  status.innerHTML = "";
  try {
    const lastRowDate = await loadMarketHistory(true);
    renderLastUpdated(lastRowDate);
    renderGrid("equity", "equityGrid");
    renderGrid("commodity", "commodityGrid");
    status.textContent = "market_history.xlsx에서 최신 데이터를 다시 불러왔습니다.";
  } catch (e) {
    status.innerHTML = `<span class="warn">⚠ 데이터를 다시 불러오지 못했습니다: ${e.message}</span>`;
  }
  btn.disabled = false;
  btn.innerHTML = "⟳ 데이터 새로고침";
}

function renderUserBadge(user) {
  const el = document.getElementById("userBadge");
  el.innerHTML = `<span class="name">${user.username}</span><button class="logout-link" onclick="logout()">로그아웃</button>`;
}

async function init(user) {
  renderUserBadge(user);
  document.getElementById("appRoot").style.display = "";
  setupToggle("toggleEquity", "equity", "equityGrid");
  setupToggle("toggleCommodity", "commodity", "commodityGrid");
  setupRangeToggle("equityRangeToggle", "equity");
  setupRangeToggle("commodityRangeToggle", "commodity");
  setupOrderControls();
  setupManagePanel();
  try {
    const lastRowDate = await loadMarketHistory(false);
    renderLastUpdated(lastRowDate);
    renderGrid("equity", "equityGrid");
    renderGrid("commodity", "commodityGrid");
  } catch (e) {
    document.getElementById("statusBar").innerHTML =
      `<span class="warn">⚠ ${DATA_FILE} 파일을 불러오지 못했습니다: ${e.message}</span>`;
  }
}

requireLogin(document.getElementById("authGateContainer"), init);
</script>

</body>
</html>
