name = "market-dashboard-brief-trigger"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Secrets (set via `wrangler secret put <NAME>`, never written here):
#   GITHUB_TOKEN   - a fine-grained GitHub PAT scoped ONLY to this repo,
#                    with "Actions: write" permission (nothing else).
#   TRIGGER_SECRET - the shared secret the dashboard button sends; must match
#                    js/daily-brief-trigger.js's TRIGGER_SECRET constant.

# Plain (non-secret) config — edit these for your own repo:
[vars]
GITHUB_OWNER = "RayenC616"
GITHUB_REPO = "market-dashboard"
WORKFLOW_FILE = "daily-brief.yml"
GIT_REF = "main"
# Restrict CORS to your actual Pages origin once you know it, e.g.
# "https://rayenc616.github.io"
ALLOWED_ORIGIN = "*"
